<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>document.documentElement.classList.add("js");</script>
  <title>Every Photo · Edward &amp; Cathy</title>
  <meta name="description" content="The complete wedding archive of Edward &amp; Cathy — every theme in one place.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Noto+Sans+SC:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/theme-all-photos.css">
</head>
<body class="theme-all">
  <nav class="site-nav">
    <a class="site-nav__home" href="index.html">Home</a>
    <span class="site-nav__couple">Edward &amp; Cathy · 林葆華 · 裴彩依</span>
  </nav>

  <header class="page-hero">
    <div class="page-hero__inner reveal">
      <p class="page-hero__eyebrow">The Archive · 全部照片</p>
      <h1 class="page-hero__en">Every Photo</h1>
      <p class="page-hero__blurb">All four worlds gathered on one wall. Filter by theme, or simply scroll.</p>
      <div class="filters" role="group" aria-label="Filter photos by theme">
        <button class="filter is-active" type="button" data-filter="all">All</button>
        <button class="filter" type="button" data-filter="traditional-chinese">Traditional CN</button>
        <button class="filter" type="button" data-filter="modern-chinese">Modern CN</button>
        <button class="filter" type="button" data-filter="western-classic">Classic</button>
        <button class="filter" type="button" data-filter="western-modern">Modern</button>
      </div>
    </div>
  </header>

  <main class="gallery gallery--masonry" data-manifest="data/all-photos.json" aria-label="All wedding photos"></main>

  <footer class="site-foot">
    <div class="site-foot__seal">囍</div>
    <p class="site-foot__line">Edward &amp; Cathy · 林葆華 與 裴彩依</p>
  </footer>

  <script src="js/lightbox.js" defer></script>
  <script src="js/gallery.js" defer></script>
  <script src="js/motion.js" defer></script>
  <script>
    // Theme filter — hides figures whose data-theme doesn't match.
    (function () {
      const bar = document.querySelector(".filters");
      const grid = document.querySelector("[data-manifest]");
      if (!bar || !grid) return;
      bar.addEventListener("click", (e) => {
        const btn = e.target.closest(".filter");
        if (!btn) return;
        bar.querySelectorAll(".filter").forEach((b) => b.classList.toggle("is-active", b === btn));
        const want = btn.dataset.filter;
        grid.querySelectorAll(".photo").forEach((fig) => {
          const show = want === "all" || fig.dataset.theme === want;
          fig.style.display = show ? "" : "none";
        });
      });
    })();
  </script>
</body>
</html>
