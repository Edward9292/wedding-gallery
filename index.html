<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>document.documentElement.classList.add("js");</script>
  <title>Edward &amp; Cathy · Our Wedding</title>
  <meta name="description" content="Wedding photographs of Edward &amp; Cathy (林葆華 · 裴彩依), organized by theme.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/theme-landing.css">
</head>
<body class="landing">

  <section class="hero">
    <div class="hero__main">
      <p class="hero__eyebrow" data-site="dateDisplay">Our Wedding</p>
      <h1 class="hero__names">
        <span data-site="groomEn">Edward</span>
        <span class="hero__amp">&amp;</span>
        <span data-site="brideEn">Cathy</span>
      </h1>
      <p class="hero__welcome" data-site="welcome">
        Thank you for celebrating with us.
      </p>
      <a class="hero__cue" href="#galleries">View the galleries</a>
    </div>

    <aside class="hero__scroll" data-parallax="-0.05">
      <div class="hero__zh" aria-hidden="true">
        <span data-site="groomZh">林葆華</span>
        <span class="hero__zh-dot">·</span>
        <span data-site="brideZh">裴彩依</span>
      </div>
      <div class="hero__seal" data-site="sealZh" aria-label="Double happiness">囍</div>
    </aside>
  </section>

  <main id="galleries" class="galleries">
    <header class="galleries__head reveal">
      <p class="galleries__eyebrow">四辑 · By Theme</p>
      <h2 class="galleries__title">The Galleries</h2>
    </header>
    <ul class="portals" data-portals></ul>

    <section id="every" class="every">
      <header class="galleries__head reveal">
        <p class="galleries__eyebrow">全部照片 · Every Photo</p>
        <h2 class="galleries__title">All of it</h2>
        <div class="filters reveal" role="group" aria-label="Filter photos by theme">
          <button class="filter is-active" type="button" data-filter="all">All</button>
          <button class="filter" type="button" data-filter="traditional-chinese">Traditional CN</button>
          <button class="filter" type="button" data-filter="modern-chinese">Modern CN</button>
          <button class="filter" type="button" data-filter="western-classic">Classic</button>
          <button class="filter" type="button" data-filter="western-modern">Modern</button>
        </div>
      </header>
      <div class="gallery gallery--masonry" data-manifest="data/all-photos.json" aria-label="All wedding photos"></div>
    </section>
  </main>

  <footer class="site-foot">
    <div class="site-foot__seal">囍</div>
    <p class="site-foot__line" data-site="footer">Edward &amp; Cathy · 林葆華 與 裴彩依</p>
  </footer>

  <script src="js/lightbox.js" defer></script>
  <script src="js/gallery.js" defer></script>
  <script src="js/motion.js" defer></script>
  <script src="js/landing.js" defer></script>
  <script>
    // Theme filter for the merged "Every Photo" grid.
    (function () {
      const bar = document.querySelector(".filters");
      const grid = document.querySelector("[data-manifest]");
      if (!bar || !grid) return;
      bar.addEventListener("click", (e) => {
        const btn = e.target.closest(".filter");
        if (!btn) return;
        bar.querySelectorAll(".filter").forEach((b) => b.classList.toggle("is-active", b === btn));
        const want = btn.dataset.filter;
        grid.querySelectorAll(".photo").forEach((fig) => {
          const show = want === "all" || fig.dataset.theme === want;
          fig.style.display = show ? "" : "none";
        });
      });
    })();
  </script>
</body>
</html>
